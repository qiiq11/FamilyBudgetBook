# 复制到服务器：/etc/nginx/sites-available/family-budget
# 将 YOUR_DOMAIN_OR_IP 改为 _ 或公网 IP
# 更新后执行：sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # 后端 API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 前端静态文件 + SPA fallback
    # assets 目录下的文件带 content hash，可长期缓存
    location /assets/ {
        root /root/FamilyBudgetBook/frontend/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # favicon
    location = /favicon.svg {
        root /root/FamilyBudgetBook/frontend/dist/public;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html 禁止缓存，确保浏览器总是获取最新版本
    location / {
        root /root/FamilyBudgetBook/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        # 关键：index.html 不缓存，避免浏览器加载旧版本
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
